<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player Stats | UFA·Data</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0c0f; --surface: #111418; --card: #161b22;
      --border: #1f2630; --accent: #00d4ff; --text: #e8edf2; --muted: #6b7a8d;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    
    header {
      height: 64px;
      padding: 0 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .back-btn {
      color: var(--accent);
      text-decoration: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      border: 1px solid rgba(0,212,255,0.2);
      padding: 0.3rem 0.7rem;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .back-btn:hover { background: rgba(0,212,255,0.08); border-color: var(--accent); }

    .game-id-display {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    main { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem 4rem; }

    .stats-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .table-wrapper { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
    
    th {
      background: var(--surface);
      text-align: left;
      padding: 1rem;
      font-family: 'Barlow Condensed', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }
    
    td { padding: 0.8rem 1rem; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover { background: rgba(255,255,255,0.02); }

    .player-cell { display: flex; flex-direction: column; }
    .player-name { font-weight: 600; color: var(--text); }
    .player-id { font-size: 0.7rem; color: var(--muted); }
    
    .num { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; color: var(--accent); }
    .stat-val { text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; }
    .stat-label { font-weight: 500; }

    .empty-state { text-align: center; padding: 4rem; color: var(--muted); }

    /* ── SCROLLBAR ───────────────────────────────────── */
    ::-webkit-scrollbar { height: 8px; width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="back-btn">← Back</a>
  <div class="game-id-display" id="gameHeader">Loading Game Stats...</div>
</header>

<main id="main">
  <div class="stats-container" id="statsContainer" style="display:none;">
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Player</th>
            <th>#</th>
            <th class="stat-val">Goals</th>
            <th class="stat-val">Assists</th>
            <th class="stat-val">Hockey A</th>
            <th class="stat-val">Cmp %</th>
            <th class="stat-val">Yds Rec</th>
            <th class="stat-val">Blocks</th>
            <th class="stat-val">Points</th>
          </tr>
        </thead>
        <tbody id="statsBody"></tbody>
      </table>
    </div>
  </div>
  <div id="statusMessage"></div>
</main>

<script>
  async function init() {
    const params = new URLSearchParams(window.location.search);
    const year   = params.get('year');
    const gameID = params.get('id');

    if (!year || !gameID) {
      showError("Missing game information in URL.");
      return;
    }

    document.getElementById('gameHeader').textContent = gameID.replace(/-/g, ' ');

    try {
      const response = await fetch(`data/${year}/played_game_stats.json`);
      if (!response.ok) throw new Error("Could not find stats file.");
      
      const allGamesData = await response.json();
      
      // Look for the specific game entry
      const gameEntry = allGamesData.find(g => g.gameID === gameID);
      
      if (!gameEntry || !gameEntry.data || !gameEntry.data.data) {
        showError("No player statistics found for this specific game.");
        return;
      }

      renderTable(gameEntry.data.data);
    } catch (err) {
      console.error(err);
      showError("Failed to load statistics. Please ensure the data files are present.");
    }
  }

  function renderTable(players) {
    const body = document.getElementById('statsBody');
    body.innerHTML = players.map(p => {
      const cmpPct = p.throwAttempts > 0 
        ? Math.round((p.completions / p.throwAttempts) * 100) 
        : 0;
      const totalPoints = (p.oPointsPlayed || 0) + (p.dPointsPlayed || 0);

      return `
        <tr>
          <td>
            <div class="player-cell">
              <span class="player-name">${p.player.firstName} ${p.player.lastName}</span>
              <span class="player-id">@${p.player.playerID}</span>
            </div>
          </td>
          <td class="num">${p.jerseyNumber}</td>
          <td class="stat-val">${p.goals}</td>
          <td class="stat-val">${p.assists}</td>
          <td class="stat-val">${p.hockeyAssists}</td>
          <td class="stat-val">${cmpPct}% <small style="font-size:0.7rem; color:var(--muted)">(${p.completions}/${p.throwAttempts})</small></td>
          <td class="stat-val">${p.yardsReceived}</td>
          <td class="stat-val">${p.blocks}</td>
          <td class="stat-val">${totalPoints}</td>
        </tr>
      `;
    }).join('');

    document.getElementById('statsContainer').style.display = 'block';
  }

  function showError(msg) {
    document.getElementById('statusMessage').innerHTML = `
      <div class="empty-state">
        <p>${msg}</p>
      </div>
    `;
  }

  init();
</script>
</body>
</html>
