<style>
  /* ── Team Detail Header ── */
  .team-detail-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }
  .team-back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: color 0.15s, background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .team-back-btn:hover { color: var(--text); background: var(--surface-2); border-color: var(--accent); }
  .team-detail-title { font-size: 1.3rem; font-weight: 700; color: var(--text); }

  /* ── Roster Table ── */
  .roster-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .roster-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  .roster-table thead th {
    padding: 8px 10px;
    text-align: right;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: color 0.15s, background 0.15s;
    width: 120px;
    min-width: 80px;
    max-width: 1fr;
    text-overflow: ellipsis;
    overflow: hidden;
  }
  /* Standardize all table headers except League standings */
  table:not(.standings-table) thead th {
    width: 120px;
    min-width: 80px;
    max-width: 1fr;
    text-overflow: ellipsis;
    overflow: hidden;
    white-space: nowrap;
  }
  .roster-table thead th:hover { color: var(--text); background: var(--surface-2); }
  .roster-table thead th.col-player { text-align: left; padding-left: 14px; }
  .roster-table thead th.sort-active { color: var(--accent); }
  .roster-table tbody td {
    padding: 8px 10px;
    text-align: right;
    border-bottom: 1px solid rgba(45, 49, 72, 0.6);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    color: var(--text);
  }
  .roster-table tbody td.col-player { text-align: left; padding-left: 14px; font-weight: 500; }
  .roster-table tbody tr:last-child td { border-bottom: none; }
  .roster-sort-ind { display: inline-block; margin-left: 3px; font-size: 0.65rem; }
  .player-link-btn {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-size: inherit;
    font-weight: 500;
    padding: 0;
    text-align: left;
    transition: color 0.15s;
  }
  .player-link-btn:hover { color: var(--text); text-decoration: underline; }
</style>

<div id="team-detail-root"></div>

<script>
(function () {
  function fetchJSON(path) {
    var base = window.basePath || '';
    return fetch(base + '/' + path).then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status + ' — ' + path);
      return r.json();
    });
  }

  var ALL_YEARS = ['2026', '2025', '2024', '2023', '2022', '2021'];

  function renderRosterContent(container, rows) {
    var cols = [
      { key: 'name', label: 'Player', player: true, fmt: function (v) { return v; } },
      { key: 'gp',   label: 'GP',     fmt: function (v) { return v; } },
      { key: 'op',   label: 'OP',     fmt: function (v) { return v; } },
      { key: 'dp',   label: 'DP',     fmt: function (v) { return v; } },
      { key: 'g',    label: 'G',      fmt: function (v) { return v; } },
      { key: 'a',    label: 'A',      fmt: function (v) { return v; } },
      { key: 'b',    label: 'B',      fmt: function (v) { return v; } },
      { key: 't',    label: 'T',      fmt: function (v) { return v; } },
      { key: 'rec',  label: 'Rec',    fmt: function (v) { return v; } },
      { key: 'pas',  label: 'Pas',    fmt: function (v) { return v; } },
    ];

    var sortCol = 'name', sortDir = 1;

    container.innerHTML =
      '<div class="roster-wrapper">' +
        '<table class="roster-table">' +
          '<thead><tr>' +
            cols.map(function (c) {
              return '<th data-col="' + c.key + '"' + (c.player ? ' class="col-player"' : '') + '>' +
                c.label + '<span class="roster-sort-ind"></span></th>';
            }).join('') +
          '</tr></thead>' +
          '<tbody></tbody>' +
        '</table>' +
      '</div>';

    var tbody = container.querySelector('tbody');
    var ths   = container.querySelectorAll('thead th[data-col]');

    function renderRows() {
      var sorted = rows.slice().sort(function (a, b) {
        var av = a[sortCol], bv = b[sortCol];
        if (typeof av === 'string') return sortDir * av.localeCompare(bv);
        if (av == null && bv == null) return 0;
        if (av == null) return 1;
        if (bv == null) return -1;
        return sortDir * (av - bv);
      });
      tbody.innerHTML = sorted.map(function (row) {
        return '<tr>' + cols.map(function (c) {
          if (c.player) {
            return '<td class="col-player"><button class="player-link-btn" data-playerid="' + row.playerID + '">' + row.name + '</button></td>';
          }
          var cls = '';
          return '<td' + cls + '>' + c.fmt(row[c.key]) + '</td>';
        }).join('') + '</tr>';
      }).join('');
    }

    function updateIndicators() {
      ths.forEach(function (th) {
        var ind = th.querySelector('.roster-sort-ind');
        if (th.dataset.col === sortCol) {
          th.classList.add('sort-active');
          ind.textContent = sortDir === 1 ? ' \u25b2' : ' \u25bc';
        } else {
          th.classList.remove('sort-active');
          ind.textContent = '';
        }
      });
    }

    ths.forEach(function (th) {
      th.addEventListener('click', function () {
        var col = th.dataset.col;
        if (sortCol === col) {
          sortDir = -sortDir;
        } else {
          sortCol = col;
          sortDir = col === 'name' ? 1 : -1;
        }
        renderRows();
        updateIndicators();
      });
    });

    renderRows();
    updateIndicators();
  }

  async function loadYearData(teamID, year, container, yearSelect) {
    container.innerHTML = '<div class="loading">Loading\u2026</div>';
    try {
      var roster = await fetchJSON('data/' + year + '/roster.json');

      var rows = roster.filter(function (p) { return p.teamID === teamID; })
        .map(function (p) {
          return {
            playerID: p.playerID,
            name: p.lastName + ', ' + p.firstName,
            gp:   p.gp,
            op:   p.oPointsPlayed,
            dp:   p.dPointsPlayed,
            g:    p.goals,
            a:    p.assists,
            b:    p.blocks,
            t:    p.throwaways,
            rec:  p.yardsReceived,
            pas:  p.yardsThrown,
          };
        });

      renderRosterContent(container, rows);
    } catch (err) {
      container.innerHTML = '<div class="error-msg">Failed to load data: ' + err.message + '</div>';
    }
  }

  window._initTeamPage = async function (teamID, year) {
    var root = document.getElementById('team-detail-root');
    if (!root) return;
    root.innerHTML = '<div class="loading">Loading\u2026</div>';

    // Extract current view from URL
    var urlParams = new URLSearchParams(window.location.search);
    var view = urlParams.get('view') || 'roster';

    // Find years this team existed
    var teamYears = [];
    var namesByYear = {};
    await Promise.all(ALL_YEARS.map(async function (y) {
      try {
        var td = await fetchJSON('data/' + y + '/teams.json');
        var entry = td.data.find(function (t) { return t.teamID === teamID; });
        if (entry) {
          teamYears.push(y);
          namesByYear[y] = entry.name;
        }
      } catch (e) { /* ignore year errors */ }
    }));

    teamYears.sort(function (a, b) { return parseInt(b) - parseInt(a); });

    if (!teamYears.length) {
      root.innerHTML = '<div class="error-msg">Team not found.</div>';
      return;
    }

    var defaultYear = (year && teamYears.indexOf(year) !== -1) ? year : teamYears[0];

    root.innerHTML =
      '<div class="team-detail-header">' +
        '<button class="team-back-btn" id="team-back-btn">\u2190 Back</button>' +
        '<span class="team-detail-title" id="team-detail-name">' + (namesByYear[defaultYear] || teamID) + '</span>' +
      '</div>' +
      '<div class="controls" style="margin-bottom:1.5rem;">' +
        '<select id="team-year-select" class="year-select">' +
          teamYears.map(function (y) {
            return '<option value="' + y + '"' + (y === defaultYear ? ' selected' : '') + '>' + y + '</option>';
          }).join('') +
        '</select>' +
        '<select id="team-view-select" class="year-select">' +
          '<option value="roster"' + (view === 'roster' ? ' selected' : '') + '>Roster</option>' +
          '<option value="games"' + (view === 'games' ? ' selected' : '') + '>Games</option>' +
        '</select>' +
      '</div>' +
      '<div id="team-content"></div>';

    document.getElementById('team-back-btn').addEventListener('click', function () {
      window.dispatchEvent(new CustomEvent('navigate-teams'));
    });

    var yearSelect = document.getElementById('team-year-select');
    var viewSelect = document.getElementById('team-view-select');
    var nameEl     = document.getElementById('team-detail-name');
    var content    = document.getElementById('team-content');

    function renderForYear(y, v) {
      nameEl.textContent = namesByYear[y] || teamID;
      if (v === 'games') {
        content.innerHTML = '<div class="empty-state">Games view coming soon.</div>';
      } else {
        loadYearData(teamID, y, content, yearSelect);
      }
    }

    yearSelect.addEventListener('change', function () {
      var newYear = yearSelect.value;
      var newView = viewSelect.value;
      renderForYear(newYear, newView);

      // Sync with the main teams list year select
      var teamsYsel = document.getElementById('teams-year-select');
      if (teamsYsel) { teamsYsel.value = newYear; }

      // Update URL without full reload
      var url = new URL(window.location.href);
      url.searchParams.set('year', newYear);
      url.searchParams.set('view', newView);
      history.replaceState(history.state, '', url.pathname + url.search);
    });

    viewSelect.addEventListener('change', function () {
      var newYear = yearSelect.value;
      var newView = viewSelect.value;
      renderForYear(newYear, newView);

      // Update URL without full reload
      var url = new URL(window.location.href);
      url.searchParams.set('year', newYear);
      url.searchParams.set('view', newView);
      history.replaceState(history.state, '', url.pathname + url.search);
    });

    content.addEventListener('click', function (e) {
      var btn = e.target.closest('.player-link-btn');
      if (!btn) return;
      window.dispatchEvent(new CustomEvent('navigate-player', {
        detail: { playerID: btn.dataset.playerid, year: yearSelect.value }
      }));
    });

    renderForYear(defaultYear, view);
  };
})();
</script>
